{% extends 'base.html' %}

{% block title %}Smart Waste Portal - Login{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 col-xl-5">
      
      <div class="eco-card p-4 p-sm-5 position-relative">
        <div class="text-center mb-4">
          <div class="stat-icon mx-auto mb-3 bg-success-subtle text-success" style="width:64px; height:64px; font-size:2rem;">
            <i class="fa-solid fa-right-to-bracket"></i>
          </div>
          <h3 class="fw-bold mb-1">Portal Login</h3>
          <p class="text-muted small">Access your Waste Management Dashboard</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text bg-body-tertiary"><i class="fa-solid fa-envelope text-muted"></i></span>
              <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
            </div>
          </div>

          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <label for="password" class="form-label fw-semibold mb-0">Password</label>
              <a href="#" class="small text-success text-decoration-none" onclick="showToast('Demo Mode: Use quick fill buttons below', 'info')">Forgot?</a>
            </div>
            <div class="input-group">
              <span class="input-group-text bg-body-tertiary"><i class="fa-solid fa-lock text-muted"></i></span>
              <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
            </div>
          </div>

          <button type="submit" class="btn btn-eco-primary w-100 py-2 fs-6 mb-3">
            <i class="fa-solid fa-right-to-bracket me-2"></i> Log In
          </button>
        </form>

        <!-- Quick Demo Login Presets -->
        <div class="bg-body-tertiary rounded-3 p-3 mt-4 border border-dashed text-center">
          <h6 class="fw-bold text-muted small mb-2"><i class="fa-solid fa-bolt text-warning me-1"></i> Quick Demo Login Presets</h6>
          <div class="d-flex flex-wrap gap-2 justify-content-center">
            <button type="button" class="btn btn-sm btn-outline-success rounded-pill" onclick="quickFill('user@example.com', 'user123')">
              <i class="fa-solid fa-user me-1"></i> Citizen
            </button>
            <button type="button" class="btn btn-sm btn-outline-primary rounded-pill" onclick="quickFill('admin@smartcity.gov', 'admin123')">
              <i class="fa-solid fa-user-shield me-1"></i> Admin
            </button>
            <button type="button" class="btn btn-sm btn-outline-info rounded-pill" onclick="quickFill('worker@smartcity.gov', 'worker123')">
              <i class="fa-solid fa-user-gear me-1"></i> Field Worker
            </button>
          </div>
        </div>

        <div class="text-center mt-4 pt-2 border-top">
          <span class="text-muted small">Don't have an account? </span>
          <a href="{{ url_for('register') }}" class="fw-bold text-success text-decoration-none">Register Citizen Account</a>
        </div>

      </div>

    </div>
  </div>
</div>

<script>
function quickFill(email, password) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = password;
  showToast(`Autofilled login details for ${email}`, 'info');
}
</script>
{% endblock %}
