{% extends 'base.html' %}

{% block title %}Smart Waste Portal - Register Account{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      
      <div class="eco-card p-4 p-sm-5">
        <div class="text-center mb-4">
          <div class="stat-icon mx-auto mb-3 bg-success-subtle text-success" style="width:64px; height:64px; font-size:2rem;">
            <i class="fa-solid fa-user-plus"></i>
          </div>
          <h3 class="fw-bold mb-1">Citizen Registration</h3>
          <p class="text-muted small">Create an account to submit and track waste reports</p>
        </div>

        <form action="{{ url_for('register') }}" method="POST">
          <div class="mb-3">
            <label for="name" class="form-label fw-semibold">Full Name</label>
            <div class="input-group">
              <span class="input-group-text bg-body-tertiary"><i class="fa-solid fa-user text-muted"></i></span>
              <input type="text" class="form-control" id="name" name="name" placeholder="e.g., Alex Johnson" required>
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label for="email" class="form-label fw-semibold">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-body-tertiary"><i class="fa-solid fa-envelope text-muted"></i></span>
                <input type="email" class="form-control" id="email" name="email" placeholder="alex@example.com" required>
              </div>
            </div>

            <div class="col-md-6">
              <label for="phone" class="form-label fw-semibold">Phone Number</label>
              <div class="input-group">
                <span class="input-group-text bg-body-tertiary"><i class="fa-solid fa-phone text-muted"></i></span>
                <input type="tel" class="form-control" id="phone" name="phone" placeholder="+1-555-0199" required>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label for="address" class="form-label fw-semibold">Residential Address</label>
            <div class="input-group">
              <span class="input-group-text bg-body-tertiary"><i class="fa-solid fa-location-dot text-muted"></i></span>
              <input type="text" class="form-control" id="address" name="address" placeholder="123 Green Street, Ward 4" required>
            </div>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label for="password" class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-body-tertiary"><i class="fa-solid fa-lock text-muted"></i></span>
                <input type="password" class="form-control" id="password" name="password" placeholder="Min 6 characters" required>
              </div>
            </div>

            <div class="col-md-6">
              <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
              <div class="input-group">
                <span class="input-group-text bg-body-tertiary"><i class="fa-solid fa-lock text-muted"></i></span>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-eco-primary w-100 py-2 fs-6 mb-3">
            <i class="fa-solid fa-check me-2"></i> Register Account
          </button>
        </form>

        <div class="text-center mt-3 pt-2 border-top">
          <span class="text-muted small">Already registered? </span>
          <a href="{{ url_for('login') }}" class="fw-bold text-success text-decoration-none">Log In Here</a>
        </div>

      </div>

    </div>
  </div>
</div>
{% endblock %}
